<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WIKI_PHYSICS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; }
        #render-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Та самая белая ошибка */
        #error-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #000; padding: 60px; z-index: 1000; cursor: pointer;
            box-sizing: border-box; font-family: "Times New Roman", serif;
        }
        #error-screen h1 { font-size: 40px; border-bottom: 2px solid #000; padding-bottom: 20px; }
        #error-screen p { font-size: 20px; }
    </style>
</head>
<body>

<div id="render-container"></div>

<div id="error-screen" onclick="reconstruct()">
    <div id="err-text">
        <h1>503 Service Unavailable</h1>
        <p>The server is temporarily unable to service your request due to maintenance downtime or capacity problems. Please try again later.</p>
        <p style="margin-top: 50px; color: #888;">[ SYSTEM_FAILURE: CLICK_TO_REBOOT ]</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;

let engine, render, runner;
let clicks = 0;

const articles = [
    {t: "QUANTUM GRAVITY", c: "THEORETICAL PHYSICS ATTEMPTING TO DESCRIBE GRAVITY ACCORDING TO QUANTUM MECHANICS"},
    {t: "CYBERNETICS", c: "CONTROL AND COMMUNICATION IN THE ANIMAL AND THE MACHINE COMPLEX SYSTEMS"},
    {t: "VOID AESTHETICS", c: "THE STUDY OF EMPTY SPACES AND MINIMALIST DIGITAL STRUCTURES"},
    {t: "ARTIFICIAL INTELLIGENCE", c: "NON-BIOLOGICAL ENTITIES CAPABLE OF PROCESSING COMPLEX DATA STREAMS"},
    {t: "ENTROPY", c: "THE GRADUAL DECLINE INTO DISORDER WITHIN A CLOSED PHYSICAL SYSTEM"},
    {t: "NEURAL NETWORK", c: "COMPUTATIONAL MODELS INSPIRED BY THE BIOLOGICAL STRUCTURE OF BRAINS"},
    {t: "EVENT HORIZON", c: "A BOUNDARY BEYOND WHICH EVENTS CANNOT AFFECT AN OBSERVER"},
    {t: "SIMULATION THEORY", c: "PROPOSAL THAT ALL REALITY IS AN ARTIFICIAL MATHEMATICAL CONSTRUCT"},
    {t: "NANOTECHNOLOGY", c: "MANIPULATION OF MATTER ON AN ATOMIC AND MOLECULAR SCALE"},
    {t: "DARK MATTER", c: "A FORM OF MATTER THAT DOES NOT EMIT LIGHT OR ENERGY"}
];

function init() {
    if(render) {
        render.canvas.remove();
        Render.stop(render);
        Runner.stop(runner);
    }

    engine = Engine.create();
    render = Render.create({
        element: document.getElementById('render-container'),
        engine: engine,
        options: { 
            width: window.innerWidth, 
            height: window.innerHeight, 
            wireframes: false, 
            background: '#fff' 
        }
    });

    const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+50, window.innerWidth, 100, {isStatic:true});
    const wallL = Bodies.rectangle(-50, window.innerHeight/2, 100, window.innerHeight, {isStatic:true});
    const wallR = Bodies.rectangle(window.innerWidth+50, window.innerHeight/2, 100, window.innerHeight, {isStatic:true});
    Composite.add(engine.world, [ground, wallL, wallR]);

    const mouse = Mouse.create(render.canvas);
    Composite.add(engine.world, MouseConstraint.create(engine, {mouse: mouse}));

    const art = articles[Math.floor(Math.random() * articles.length)];
    
    // Заголовок (большой блок)
    const title = Bodies.rectangle(window.innerWidth/2, 100, 700, 80, {
        render: { sprite: { texture: drawCanvas(art.t, 50, true) } }
    });
    Composite.add(engine.world, title);

    // Куски текста (средние блоки)
    const words = art.c.split(' ');
    words.forEach((word, i) => {
        setTimeout(() => {
            const b = Bodies.rectangle(Math.random()*window.innerWidth, -100, 200, 50, {
                render: { sprite: { texture: drawCanvas(word, 24, false) } }
            });
            Composite.add(engine.world, b);
        }, i * 150);
    });

    Render.run(render);
    runner = Runner.create();
    Runner.run(runner, engine);
}

function drawCanvas(txt, size, isBold) {
    const can = document.createElement('canvas');
    const ctx = can.getContext('2d');
    can.width = 750; can.height = 100;
    ctx.font = `${isBold ? 'bold' : ''} ${size}px Courier New`;
    ctx.fillStyle = "#000";
    ctx.fillText(txt, 20, 60);
    return can.toDataURL();
}

window.addEventListener('mousedown', () => {
    clicks++;
    if(clicks > 12) document.getElementById('error-screen').style.display = 'block';
});

function reconstruct() {
    clicks = 0;
    const err = document.getElementById('err-text');
    err.style.transition = "transform 0.4s ease-in, opacity 0.4s";
    err.style.transform = "scale(2) rotate(10deg)";
    err.style.opacity = "0";
    
    setTimeout(() => {
        err.style.transform = "scale(1) rotate(0deg)";
        err.style.opacity = "1";
        init();
    }, 400);
}

init();
</script>
</body>
</html>
