<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SITE_30</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Та самая белая ошибка */
        #error-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #000; padding: 50px; box-sizing: border-box; z-index: 1000;
        }
        #error-msg { font-family: "Times New Roman", serif; font-size: 18px; }

        /* Финальное восстановление */
        #final-msg {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 50px; font-weight: bold; z-index: 2000; text-align: center;
        }
    </style>
</head>
<body>

<div id="error-screen">
    <div id="error-msg">
        <h1>503 Service Unavailable</h1>
        <p>The server is temporarily unable to service your request due to maintenance downtime or capacity problems. Please try again later.</p>
        <hr>
        <address>Apache/2.4.41 (Ubuntu) Server at localhost Port 80</address>
    </div>
</div>

<div id="final-msg">ALWAYS IN TOUCH</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
const engine = Engine.create();
const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
});

const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
Composite.add(engine.world, ground);

async function run() {
    try {
        // Берем список из 30 страниц
        const res = await fetch('https://en.wikipedia.org/w/api.php?action=query&format=json&list=random&rnlimit=30&origin=*');
        const data = await res.json();
        const pool = data.query.random;

        // Выбираем ОДНУ из 30 для этой сессии
        const selected = pool[Math.floor(Math.random() * 30)];

        // Грузим её текст
        const cRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(selected.title)}&format=json&origin=*`);
        const cData = await cRes.json();
        const text = Object.values(cData.query.pages)[0].extract || "CONNECTION_ERROR";

        // Дробим на 30 кусков и бросаем в физику
        const fragments = text.split('. ').slice(0, 30);
        fragments.forEach((fragment, i) => {
            setTimeout(() => {
                const box = Bodies.rectangle(
                    Math.random() * window.innerWidth, -100,
                    Math.min(fragment.length * 8, 300), 40, {
                    render: { fillStyle: '#111', strokeStyle: '#fff', lineWidth: 1 }
                });
                Composite.add(engine.world, box);
            }, i * 200);
        });
    } catch (e) {}
}

const mouse = Mouse.create(render.canvas);
const mc = MouseConstraint.create(engine, { mouse: mouse });
Composite.add(engine.world, mc);

let clicks = 0;
window.addEventListener('mousedown', () => {
    clicks++;
    if(clicks > 15) {
        document.getElementById('error-screen').style.display = 'block';
        setTimeout(() => {
            const msg = document.getElementById('error-msg');
            msg.style.transition = 'transform 3s ease-in';
            msg.style.transform = 'translateY(110vh) rotate(15deg)';
            setTimeout(() => {
                document.getElementById('error-screen').style.background = '#000';
                document.getElementById('final-msg').style.display = 'block';
            }, 2500);
        }, 3000);
    }
});

Render.run(render);
Runner.run(Runner.create(), engine);
run();
</script>
</body>
</html>
