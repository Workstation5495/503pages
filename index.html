<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>503page</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: crosshair; }
        canvas { position: absolute; top: 0; left: 0; }
        
        /* Глитч-эффект для всего экрана */
        .glitch { animation: shake 0.1s infinite; filter: hue-rotate(90deg); }
        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(1px, -2px); }
        }

        /* Трещины */
        #cracks {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 500; opacity: 0.8;
        }

        /* Ошибка 503 */
        #error-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #000; padding: 50px; z-index: 1000;
            font-family: "Times New Roman", serif; cursor: pointer;
        }
        #error-screen h1 { font-size: 48px; margin: 0; }
        
        #ui-layer {
            position: fixed; top: 10px; left: 10px; color: #0f0; 
            font-family: monospace; font-size: 10px; z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui-layer">SYSTEM_VOLTAGE: CRITICAL<br>MEMORY_LEAK: DETECTED</div>
<canvas id="cracks"></canvas>
<div id="render-container"></div>

<div id="error-screen" onclick="reboot()">
    <h1>503 Service Unavailable</h1>
    <p>The server is temporarily unable to service your request due to maintenance downtime or capacity problems.</p>
    <hr>
    <address>Apache/2.4.41 (Ubuntu) Server at localhost Port 80</address>
    <p style="margin-top:100px; font-weight:bold;">[ CLICK TO FORCE RECONSTRUCTION ]</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events } = Matter;

let engine, render, runner, audioCtx;
let integrity = 100;

// Звуковой движок для глитчей
function playGlitchSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(Math.random() * 500 + 50, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function drawCrack(x, y) {
    const canvas = document.getElementById('cracks');
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y);
    for(let i=0; i<5; i++) {
        ctx.lineTo(x + (Math.random()-0.5)*100, y + (Math.random()-0.5)*100);
    }
    ctx.stroke();
}

function init() {
    const container = document.getElementById('render-container');
    container.innerHTML = '';
    const crackCanvas = document.getElementById('cracks');
    crackCanvas.width = window.innerWidth;
    crackCanvas.height = window.innerHeight;
    
    engine = Engine.create();
    render = Render.create({
        element: container,
        engine: engine,
        options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#000' }
    });

    const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+50, window.innerWidth, 100, { isStatic: true });
    Composite.add(engine.world, ground);

    // Добавляем куски кода и текста
    const codeSnippets = ["void main()", "{", "ptr = 0x00", "fatal_error", "if(null)", "assembly_bin", "01011010", "segmentation_fault"];
    
    for(let i=0; i<150; i++) {
        setTimeout(() => {
            let isText = Math.random() > 0.4;
            let w = isText ? 120 : 15;
            let h = isText ? 30 : 15;
            let body = Bodies.rectangle(Math.random()*window.innerWidth, -100, w, h, {
                render: { 
                    fillStyle: isText ? '#111' : (Math.random() > 0.5 ? '#00f' : '#fff'),
                    strokeStyle: '#0f0',
                    lineWidth: isText ? 1 : 0
                }
            });
            Composite.add(engine.world, body);
        }, i * 30);
    }

    const mouse = Mouse.create(render.canvas);
    Composite.add(engine.world, MouseConstraint.create(engine, { mouse: mouse }));

    // Коллизии вызывают звуки и трещины
    Events.on(engine, 'collisionStart', (event) => {
        if(Math.random() > 0.8) {
            playGlitchSound();
            integrity -= 1;
            if(integrity < 50) document.body.classList.add('glitch');
            if(integrity <= 0) document.getElementById('error-screen').style.display = 'block';
        }
    });

    Render.run(render);
    runner = Runner.create();
    Runner.run(runner, engine);
}

window.addEventListener('mousedown', (e) => {
    drawCrack(e.clientX, e.clientY);
    playGlitchSound();
});

function reboot() {
    location.reload(); // Перезагружаем всё для новой сессии
}

init();
</script>
</body>
</html>
