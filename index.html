<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #log { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 11px; z-index: 10; }
        
        #error-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #000; padding: 50px; z-index: 1000;
        }
        #error-content { font-family: serif; }

        #final-msg {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 50px; font-weight: bold; text-align: center; z-index: 2000;
            letter-spacing: 12px; text-shadow: 0 0 15px #00f;
        }
    </style>
</head>
<body>

<div id="log">
    ID: <span id="active-id">...</span><br>
    TOPIC: <span id="topic">...</span>
</div>

<div id="error-screen">
    <div id="error-content">
        <h1>503 Service Unavailable</h1>
        <p>The server is temporarily unable to service your request due to maintenance downtime or capacity problems.</p>
        <hr>
        <address>Apache/2.4.41 (Ubuntu) Server</address>
    </div>
</div>

<div id="final-msg">ALWAYS IN TOUCH</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
const engine = Engine.create();
const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
});

const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
Composite.add(engine.world, ground);

async function runSession() {
    try {
        // Запрос 30 случайных статей
        const url = "https://en.wikipedia.org/w/api.php?action=query&format=json&list=random&rnlimit=30&origin=*";
        const res = await fetch(url);
        const data = await res.json();
        const pool = data.query.random;

        // Выбор 1 из 30
        const idx = Math.floor(Math.random() * 30);
        const selected = pool[idx];
        
        document.getElementById('active-id').innerText = idx + 1;
        document.getElementById('topic').innerText = selected.title.toUpperCase();

        // Загрузка контента выбранной статьи
        const contentUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(selected.title)}&format=json&origin=*`;
        const cRes = await fetch(contentUrl);
        const cData = await cRes.json();
        const pages = cData.query.pages;
        const text = pages[Object.keys(pages)[0]].extract || "NO_DATA";

        // Создание 30 фрагментов
        const lines = text.split('. ').slice(0, 30);
        lines.forEach((line, i) => {
            if (line.length < 3) return;
            setTimeout(() => {
                const box = Bodies.rectangle(
                    Math.random() * window.innerWidth, -50,
                    Math.min(line.length * 7, 350), 30, {
                    render: { sprite: { texture: makeLabel(line.substring(0, 50)) } }
                });
                Composite.add(engine.world, box);
            }, i * 200);
        });
    } catch (e) { document.getElementById('topic').innerText = "CONNECTION_ERROR"; }
}

function makeLabel(str) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 40;
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,400,40);
    ctx.strokeStyle = '#0f0'; ctx.strokeRect(0,0,400,40);
    ctx.fillStyle = '#0f0'; ctx.font = '12px monospace';
    ctx.fillText(str.toUpperCase(), 10, 25);
    return canvas.toDataURL();
}

const mouse = Mouse.create(render.canvas);
const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse });
Composite.add(engine.world, mouseConstraint);

let clicks = 0;
window.addEventListener('mousedown', () => {
    clicks++;
    if (clicks > 12) {
        document.getElementById('error-screen').style.display = 'block';
        setTimeout(() => {
            const err = document.getElementById('error-content');
            err.style.transition = 'all 2s ease-in';
            err.style.transform = 'translateY(110vh) rotate(10deg)';
            setTimeout(() => {
                document.getElementById('error-screen').style.background = '#000';
                document.getElementById('final-msg').style.display = 'block';
            }, 2000);
        }, 3000);
    }
});

Render.run(render);
Runner.run(Runner.create(), engine);
runSession();
</script>
</body>
</html>
